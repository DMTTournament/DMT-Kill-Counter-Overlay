<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Impact, "Stencil", "Arial Black", sans-serif;
    }

    .scoreboard {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 55px;
      padding: 16px 34px;
      background: rgba(0, 0, 0, 0.88);
      border: 3px solid #8B0000;
      border-radius: 10px;
      box-shadow: 0 0 18px rgba(139, 0, 0, 0.8);
      letter-spacing: 2px;
      text-align: center;
    }

    .team-box {
      min-width: 190px;
    }

    .team-name {
      font-size: 34px;
      font-weight: bold;
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
    }

    .allies-name {
      color: #2f7dff;
      text-shadow: 0 0 10px rgba(47, 125, 255, 0.8);
    }

    .axis-name {
      color: #ff2a2a;
      text-shadow: 0 0 10px rgba(255, 42, 42, 0.8);
    }

    .kill-label {
      font-size: 24px;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 4px;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .kills {
      display: inline-block;
      min-width: 50px;
      font-size: 42px;
      color: #ff2a2a;
      text-align: center;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
    }

    .divider {
      color: #8B0000;
      font-size: 58px;
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .pulse {
      animation: killPulse 0.45s ease-out;
    }

    @keyframes killPulse {
      0% {
        transform: scale(1);
        text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      }
      50% {
        transform: scale(1.35);
        text-shadow: 0 0 24px rgba(255, 0, 0, 1);
      }
      100% {
        transform: scale(1);
        text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      }
    }
  </style>
</head>

<body>
  <div class="scoreboard">
    <div class="team-box">
      <div class="team-name allies-name">ALLIES</div>
      <div class="kill-label">Kill Count:</div>
      <div class="kills" id="alliesKills">0</div>
    </div>

    <div class="divider">|</div>

    <div class="team-box">
      <div class="team-name axis-name">AXIS</div>
      <div class="kill-label">Kill Count:</div>
      <div class="kills" id="axisKills">0</div>
    </div>
  </div>

  <script>
    let previousAllies = 0;
    let previousAxis = 0;

    function pulse(element) {
      element.classList.remove('pulse');
      void element.offsetWidth;
      element.classList.add('pulse');
    }

    async function update() {
      const res = await fetch('/stats');
      const data = await res.json();

      const alliesEl = document.getElementById('alliesKills');
      const axisEl = document.getElementById('axisKills');

      if (data.allies !== previousAllies) {
        alliesEl.innerText = data.allies;
        pulse(alliesEl);
        previousAllies = data.allies;
      }

      if (data.axis !== previousAxis) {
        axisEl.innerText = data.axis;
        pulse(axisEl);
        previousAxis = data.axis;
      }
    }

    setInterval(update, 2000);
    update();
  </script>
</body>
</html>

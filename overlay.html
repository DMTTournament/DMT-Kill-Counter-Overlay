<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Impact, "Stencil", "Arial Black", sans-serif;
    }

    .scoreboard {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      padding: 12px 30px;
      background: rgba(0, 0, 0, 0.88);
      border: 3px solid #8B0000;
      border-radius: 10px;
      box-shadow: 0 0 18px rgba(139, 0, 0, 0.8);
      letter-spacing: 2px;
    }

    .team {
      font-size: 36px;
      font-weight: bold;
      color: #ff2a2a;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.65);
    }

    .kills {
      display: inline-block;
      min-width: 45px;
      text-align: center;
    }

    .divider {
      color: #8B0000;
      font-size: 32px;
      display: flex;
      align-items: center;
    }

    .pulse {
      animation: killPulse 0.45s ease-out;
    }

    @keyframes killPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>
  <div class="scoreboard">
    <div class="team">ALLIES: <span class="kills" id="alliesKills">0</span></div>
    <div class="divider">|</div>
    <div class="team">AXIS: <span class="kills" id="axisKills">0</span></div>
  </div>

  <script>
    let previousAllies = 0;
    let previousAxis = 0;

    function pulse(element) {
      element.classList.remove('pulse');
      void element.offsetWidth;
      element.classList.add('pulse');
    }

    async function update() {
      const res = await fetch('/stats');
      const data = await res.json();

      const alliesEl = document.getElementById('alliesKills');
      const axisEl = document.getElementById('axisKills');

      if (data.allies !== previousAllies) {
        alliesEl.innerText = data.allies;
        pulse(alliesEl);
        previousAllies = data.allies;
      }

      if (data.axis !== previousAxis) {
        axisEl.innerText = data.axis;
        pulse(axisEl);
        previousAxis = data.axis;
      }
    }

    setInterval(update, 2000);
    update();
  </script>
</body>
</html>
